apiVersion: 1

providers:
  - name: Portfolio Dashboards
    orgId: 1
    folder: Portfolio
    folderUid: portfolio
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
